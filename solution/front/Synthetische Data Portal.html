<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Synthetische Data Portal — Demografische populatie</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  /* Brand font — self-hosted Poppins (user-uploaded) */
  @font-face { font-family: "Poppins"; font-style: normal; font-weight: 300; font-display: swap; src: url("fonts/Poppins-Light.ttf") format("truetype"); }
  @font-face { font-family: "Poppins"; font-style: normal; font-weight: 400; font-display: swap; src: url("fonts/Poppins-Regular.ttf") format("truetype"); }
  @font-face { font-family: "Poppins"; font-style: italic; font-weight: 400; font-display: swap; src: url("fonts/Poppins-Italic.ttf") format("truetype"); }
  @font-face { font-family: "Poppins"; font-style: normal; font-weight: 500; font-display: swap; src: url("fonts/Poppins-Medium.ttf") format("truetype"); }
  @font-face { font-family: "Poppins"; font-style: normal; font-weight: 600; font-display: swap; src: url("fonts/Poppins-SemiBold.ttf") format("truetype"); }
  @font-face { font-family: "Poppins"; font-style: normal; font-weight: 700; font-display: swap; src: url("fonts/Poppins-Bold.ttf") format("truetype"); }
  @font-face { font-family: "Poppins"; font-style: normal; font-weight: 800; font-display: swap; src: url("fonts/Poppins-ExtraBold.ttf") format("truetype"); }
  :root {
    /* Color theme — overridden by Tweaks */
    --primary: #154273;        /* Rijksoverheid donkerblauw */
    --primary-dark: #0b2c50;
    --accent: #007bc7;         /* hemelblauw / links */
    --accent-dark: #00669e;
    --on-primary: #ffffff;

    /* Neutrals */
    --bg: #ffffff;
    --bg-muted: #f3f4f6;
    --bg-sunken: #eceef1;
    --surface: #ffffff;
    --border: #c9ccd1;
    --border-strong: #8c9098;
    --fg: #15171a;
    --fg-muted: #4a4f57;
    --fg-subtle: #6b7079;

    /* Semantic */
    --ok: #2e7d32;
    --ok-bg: #e6f3e6;
    --warn: #b75d00;
    --warn-bg: #fbeed9;
    --err: #c81e1e;
    --err-bg: #fbe5e5;

    /* Focus — high-visibility for WCAG 2.2 */
    --focus: #ffb612;          /* Rijkshuisstijl geel */
    --focus-ring: 0 0 0 3px #15171a, 0 0 0 6px #ffb612;

    /* Chart categorical palette */
    --c1: #154273; --c2: #007bc7; --c3: #76d2b6; --c4: #f4a701;
    --c5: #a90061; --c6: #8fcae7; --c7: #d98a00; --c8: #275937;

    /* Schematic map */
    --map-street: #dde3ea;
    --map-block: #f4f6f8;
    --map-park: #cfe6cf;
    --map-water: #bcd8ef;

    /* Spacing / shape */
    --radius: 6px;
    --radius-lg: 10px;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.08);
    --shadow-md: 0 2px 6px rgba(15,23,42,.08), 0 8px 24px rgba(15,23,42,.08);
    --maxw: 1180px;

    --font: "Poppins", "Source Sans 3", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --density: 1;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    color: var(--fg);
    background: var(--bg-muted);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    line-height: 1.5;
  }
  #root { min-height: 100vh; }

  /* Universal accessible focus */
  a:focus-visible, button:focus-visible, input:focus-visible,
  select:focus-visible, [tabindex]:focus-visible, summary:focus-visible,
  [role="button"]:focus-visible, [role="radio"]:focus-visible, [role="checkbox"]:focus-visible {
    outline: 3px solid var(--focus);
    outline-offset: 2px;
    box-shadow: 0 0 0 2px var(--fg);
  }

  ::selection { background: color-mix(in srgb, var(--accent) 28%, transparent); }

  .visually-hidden {
    position: absolute !important; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0);
    white-space: nowrap; border: 0;
  }
  .skip-link {
    position: absolute; left: 16px; top: -60px; z-index: 1000;
    background: var(--primary); color: #fff; padding: 12px 18px;
    border-radius: 0 0 var(--radius) var(--radius); font-weight: 700; text-decoration: none;
    transition: top .15s ease;
  }
  .skip-link:focus { top: 0; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }

  /* Stepper: more breathing room between steps on narrow screens */
  @media (max-width: 560px) {
    .sd-steplist { gap: 8px 10px !important; padding-left: 18px !important; padding-right: 18px !important; }
    .sd-steplist > li { gap: 8px !important; }
    .sd-steplist > li > span[aria-hidden="true"]:last-child { margin: 0 8px !important; }
  }
</style>
</head>
<body>
  <a href="#hoofdinhoud" class="skip-link">Naar hoofdinhoud</a>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="bundle.jsx"></script>
</body>
</html>
